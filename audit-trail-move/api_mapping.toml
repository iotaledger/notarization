# Audit Trail API Mapping
#
# Maps each public Move function or struct in the `audit-trail-move/sources/` modules
# to the related Rust entities in `audit-trail-rs/src/` and WASM/TS entities in
# `bindings/wasm/audit_trail_wasm/src/`.
#
# TOML keys are formed as `<move_module>.<move_function_or_struct>`.
#
# `rust` and `wasm` arrays list the Rust- resp. WASM-level functions, methods, and
# types that wrap, build, or otherwise correspond to the Move entity. Entries use
# `Type::method` for inherent methods, `Type` for plain types/structs/enums, and
# `module::function` for free functions.
#
# This mapping is intended for automatic comparison of function and struct
# documentation across the three implementation layers.

# =============================================================================
