name: Wasm publish to npm

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "Which operation to perform"
        required: true
        type: choice
        options:
          - publish
          - retag
      publish-tag:
        description: "PUBLISH - Tag to publish Wasm under"
        required: false
      publish-branch:
        description: "PUBLISH - Branch to run publish from"
        required: false
      publish-dry-run:
        description: "PUBLISH - Run in dry-run mode"
        type: boolean
        required: false
        default: true
      retag-version:
        description: "RETAG - version to set tag on"
        required: false
      retag-tag:
        description: "RETAG - Tag to set"
        required: false
      package:
        description: "Which package to publish/retag"
        required: true
        type: choice
        options:
          - notarization
          - audit-trail

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  check-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Check inputs
        shell: bash
        run: |
          check_vars()
          {
              var_names=("$@")
              for var_name in "${var_names[@]}"; do
                  [ -z "${!var_name}" ] && echo "$var_name is unset." && var_unset=true
              done
              [ -n "$var_unset" ] && exit 1
              return 0
          }

          publish_tag=${{ github.event.inputs.publish-tag }}
          publish_branch=${{ github.event.inputs.publish-branch }}

          retag_version=${{ github.event.inputs.retag-version }}
          retag_tag=${{ github.event.inputs.retag-tag }}

          if [[ ${{ github.event.inputs.operation }} == 'publish' ]]; then
            check_vars publish_tag publish_branch
          fi

          if [[ ${{ github.event.inputs.operation }} == 'retag' ]]; then
            check_vars retag_version retag_tag
          fi

  build-wasm-notarization:
    if: ${{ github.event.inputs.operation == 'publish' && github.event.inputs.package == 'notarization' }}
    needs: [check-inputs]
    uses: "./.github/workflows/shared-build-wasm.yml"
    with:
      run-unit-tests: false
      ref: ${{ github.event.inputs.publish-branch }}
      output-artifact-name: notarization-wasm-bindings-build

  build-wasm-audit-trail:
    if: ${{ github.event.inputs.operation == 'publish' && github.event.inputs.package == 'audit-trail' }}
    needs: [check-inputs]
    uses: "./.github/workflows/shared-build-wasm.yml"
    with:
      run-unit-tests: false
      ref: ${{ github.event.inputs.publish-branch }}
      output-artifact-name: audit-trail-wasm-bindings-build
      wasm-package-dir: bindings/wasm/audit_trail_wasm
      wasm-crate-name: audit_trail_wasm

  release-wasm-notarization:
    if: ${{ github.event.inputs.operation == 'publish' && github.event.inputs.package == 'notarization' }}
    runs-on: ubuntu-latest
    needs: [build-wasm-notarization]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.publish-branch }}
      - name: Release to npm
        uses: "./.github/actions/publish/wasm"
        with:
          dry-run: ${{ github.event.inputs.publish-dry-run }}
          input-artifact-name: notarization-wasm-bindings-build
          working-directory: ./bindings/wasm/notarization_wasm
          tag: ${{ github.event.inputs.publish-tag }}

  release-wasm-audit-trail:
    if: ${{ github.event.inputs.operation == 'publish' && github.event.inputs.package == 'audit-trail' }}
    runs-on: ubuntu-latest
    needs: [build-wasm-audit-trail]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.publish-branch }}
      - name: Release to npm
        uses: "./.github/actions/publish/wasm"
        with:
          dry-run: ${{ github.event.inputs.publish-dry-run }}
          input-artifact-name: audit-trail-wasm-bindings-build
          working-directory: ./bindings/wasm/audit_trail_wasm
          tag: ${{ github.event.inputs.publish-tag }}

  retag-wasm:
    if: ${{ github.event.inputs.operation == 'retag' }}
    needs: [check-inputs]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Run dist-tag notarization
        if: ${{ github.event.inputs.package == 'notarization' }}
        shell: bash
        run: |
          npm dist-tag add @iota/notarization@${{ github.event.inputs.retag-version }} ${{ github.event.inputs.retag-tag }}

      - name: Run dist-tag audit-trail
        if: ${{ github.event.inputs.package == 'audit-trail' }}
        shell: bash
        run: |
          npm dist-tag add @iota/audit-trail@${{ github.event.inputs.retag-version }} ${{ github.event.inputs.retag-tag }}
