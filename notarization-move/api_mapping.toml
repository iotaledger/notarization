# Notarization API Mapping
#
# Maps each public Move function or struct in the `notarization-move/sources/` modules
# to the related Rust entities in `notarization-rs/src/` and WASM/TS entities in
# `bindings/wasm/notarization_wasm/src/`.
#
# TOML section keys are formed as `<product>.<module>.<entity>`:
#   - `<product>` — the product identifier, derived from the basename of the
#     Move package directory with any trailing `-move` stripped and `-`
#     replaced by `_`. For this file: `notarization`.
#   - `<module>`  — `main` for the Move source file whose basename matches
#     the product name (`notarization.move` → `main`); for any other Move
#     source file, the bare filename without extension (e.g. `method.move`
#     → `method`).
#   - `<entity>`  — the function name or struct/enum/const name in that module.
#
# `rust` and `wasm` arrays list the Rust- resp. WASM-level functions, methods,
# and types that wrap, build, or otherwise correspond to the Move entity.
# Entry conventions:
#   - `Type::method`     — an inherent method on `Type`
#   - `Type::Variant`    — an enum variant
#   - `Type`             — a plain type/struct/enum
#   - `Type.field`       — a struct field
#   - `module::function` — a free function
#
# An entry of `[]` means there is intentionally no counterpart on that side.
#
# This mapping is intended for automatic comparison of function and struct
# documentation across the three implementation layers, and is maintained via
# the `update-api-mapping` and `sync-product-docs` skills under `.claude/skills/`.

